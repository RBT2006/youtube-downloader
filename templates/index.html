<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader - Gratis y Rápido</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      color: white;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(59,130,246,0.3);
    }
    h1 { text-align: center; font-size: 2.8rem; margin: 0 0 8px 0; }
    p { text-align: center; color: #94a3b8; margin-bottom: 30px; }
    input {
      width: 100%;
      padding: 18px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      background: #1e2937;
      color: white;
      margin-bottom: 20px;
    }
    .options {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-video { background: #3b82f6; }
    .btn-audio { background: #22c55e; }
    button:hover { transform: translateY(-4px); }
    #status { margin-top: 20px; text-align: center; min-height: 30px; font-weight: 500; }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 YT Downloader</h1>
    <p>Descarga videos y audios de YouTube en alta calidad</p>

    <input type="text" id="url" placeholder="Pega el enlace de YouTube aquí...">

    <div class="options">
      <button class="btn-video" onclick="download('video')">📹 Video MP4</button>
      <button class="btn-audio" onclick="download('audio')">🎵 Audio MP3</button>
    </div>

    <button onclick="clearAll()" style="background:#ef4444; width:100%; padding:16px;">🗑️ Limpiar</button>

    <div id="status"></div>
  </div>

  <script>
    async function download(type) {
      const url = document.getElementById('url').value.trim();
      const status = document.getElementById('status');

      if (!url) {
        status.innerHTML = '<span style="color:red">❌ Ingresa un enlace</span>';
        return;
      }

      status.innerHTML = '<span style="color:#eab308">⏳ Procesando... <span class="spinner">⟳</span></span>';

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url, format: type})
        });

        if (res.ok) {
          const blob = await res.blob();
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = type === 'audio' ? 'audio.mp3' : 'video.mp4';
          a.click();
          status.innerHTML = '<span style="color:#22c55e">✅ ¡Descarga iniciada!</span>';
        } else {
          const data = await res.json();
          status.innerHTML = `<span style="color:red">❌ ${data.error}</span>`;
        }
      } catch (err) {
        status.innerHTML = '<span style="color:red">❌ Error de conexión</span>';
      }
    }

    function clearAll() {
      document.getElementById('url').value = '';
      document.getElementById('status').innerHTML = '';
    }
  </script>
</body>
</html>
