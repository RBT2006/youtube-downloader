<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolify - Herramientas Online Gratis</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e2937); color: #e2e8f0; margin:0; padding:0; }
    .navbar {
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(99,102,241,0.2);
    }
    .logo { color: #6366f1; font-size: 1.8rem; font-weight: 700; }
    .btn-login {
      background: #22c55e;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
    /* Resto del diseño anterior... */
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Toolify</div>
    <button class="btn-login" onclick="alert('Login con Google - Próximamente')">
      <i class="fab fa-google"></i> Iniciar Sesión
    </button>
  </nav>

  <!-- Resto de tu contenido aquí -->
</body>
</html>
