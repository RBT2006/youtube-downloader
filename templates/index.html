<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herramientas Online - Gratis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e40af);
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 40px;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }
    .tool-card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .tool-card h3 {
      margin: 0 0 15px 0;
      color: #60a5fa;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1e2937;
      color: white;
      margin: 10px 0;
    }
    button {
      padding: 12px 25px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #2563eb;
    }
    #result {
      margin-top: 15px;
      padding: 15px;
      background: #1e2937;
      border-radius: 10px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Herramientas Online</h1>
    <p class="subtitle">Utilidades gratuitas y rápidas</p>

    <div class="tools-grid">
      <!-- QR Generator -->
      <div class="tool-card">
        <h3>🔲 Generador de QR</h3>
        <input type="text" id="qr-text" placeholder="Texto o enlace">
        <button onclick="generateQR()">Generar QR</button>
        <div id="qr-result"></div>
      </div>

      <!-- Password Generator -->
      <div class="tool-card">
        <h3>🔑 Generador de Contraseñas</h3>
        <input type="number" id="pass-length" value="16" min="8" max="64">
        <button onclick="generatePassword()">Generar Contraseña</button>
        <div id="password-result" style="font-family: monospace; font-size: 1.2rem;"></div>
      </div>

      <!-- Base64 -->
      <div class="tool-card">
        <h3>🔄 Base64 Encoder/Decoder</h3>
        <textarea id="base64-text" rows="3" placeholder="Texto aquí..."></textarea>
        <button onclick="base64Action('encode')">Codificar</button>
        <button onclick="base64Action('decode')">Decodificar</button>
        <div id="base64-result"></div>
      </div>
    </div>
  </div>

  <script>
    async function generateQR() {
      const text = document.getElementById('qr-text').value;
      const result = document.getElementById('qr-result');
      if (!text) return alert("Ingresa texto");

      const res = await fetch('/api/qr', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text})
      });
      const data = await res.json();
      if (data.image) {
        result.innerHTML = `<img src="${data.image}" style="max-width:100%; margin-top:15px;">`;
      }
    }

    async function generatePassword() {
      const length = document.getElementById('pass-length').value;
      const res = await fetch('/api/password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({length: parseInt(length)})
      });
      const data = await res.json();
      document.getElementById('password-result').innerHTML = 
        `<strong>${data.password}</strong>`;
    }

    async function base64Action(action) {
      const text = document.getElementById('base64-text').value;
      const res = await fetch('/api/base64', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text, action})
      });
      const data = await res.json();
      document.getElementById('base64-result').innerHTML = `<strong>${data.result || data.error}</strong>`;
    }
  </script>
</body>
</html>
