<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolify - Herramientas Online</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e2e8f0;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .navbar {
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    }

    .hero {
      text-align: center;
      padding: 100px 20px 60px;
    }

    .hero h1 {
      font-size: 3.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #6366f1, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 25px;
      padding: 40px 5%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tool-card {
      background: #1e2937;
      border-radius: 20px;
      padding: 30px;
      transition: all 0.4s ease;
      border: 1px solid rgba(99, 102, 241, 0.15);
    }

    .tool-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .input-field {
      width: 100%;
      padding: 14px;
      background: #334155;
      border: none;
      border-radius: 12px;
      color: white;
      margin: 12px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .copy-btn {
      background: #475569;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #0f172a;
      border-radius: 12px;
      min-height: 70px;
    }

    .history {
      margin-top: 40px;
      padding: 0 5%;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: white;
      padding: 14px 28px;
      border-radius: 9999px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.4);
      display: none;
      z-index: 2000;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <h2 style="color:#6366f1; font-weight:700;">Toolify</h2>
    <button onclick="alert('Login con Google próximamente')" style="background:#22c55e; padding:10px 20px; border:none; border-radius:9999px; color:white; font-weight:600;">
      <i class="fab fa-google"></i> Iniciar Sesión
    </button>
  </nav>

  <div class="hero">
    <h1>Herramientas Online</h1>
    <p style="font-size:1.25rem; color:#94a3b8;">Profesionales • Rápidas • Gratuitas</p>
  </div>

  <div class="tools-grid">
    <!-- QR -->
    <div class="tool-card">
      <h3>🔲 Generador de QR</h3>
      <input type="text" id="qr-input" class="input-field" placeholder="Texto o enlace...">
      <button onclick="generateQR()">Generar Código QR</button>
      <div id="qr-result" class="result"></div>
    </div>

    <!-- Password -->
    <div class="tool-card">
      <h3>🔑 Generador de Contraseñas</h3>
      <input type="number" id="pass-length" class="input-field" value="18" min="8" max="64">
      <button onclick="generatePassword()">Generar Contraseña Segura</button>
      <div id="password-result" class="result"></div>
    </div>

    <!-- Base64 -->
    <div class="tool-card">
      <h3>🔄 Base64</h3>
      <textarea id="base64-input" class="input-field" rows="4" placeholder="Escribe aquí..."></textarea>
      <div style="display:flex; gap:10px;">
        <button onclick="base64Action('encode')">Codificar</button>
        <button onclick="base64Action('decode')">Decodificar</button>
      </div>
      <div id="base64-result" class="result"></div>
    </div>
  </div>

  <div class="history">
    <h2 style="margin-bottom:20px;">📜 Mis QR Generados</h2>
    <div id="history-list"></div>
  </div>

  <div class="toast" id="toast">✅ Copiado correctamente</div>

  <script>
    let qrHistory = JSON.parse(localStorage.getItem('qrHistory')) || [];

    function saveToHistory(text, imageData) {
      qrHistory.unshift({text, imageData, date: new Date().toLocaleString()});
      if (qrHistory.length > 10) qrHistory.pop();
      localStorage.setItem('qrHistory', JSON.stringify(qrHistory));
      loadHistory();
    }

    function loadHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = qrHistory.map((item, i) => `
        <div style="background:#1e2937; padding:15px; border-radius:12px; margin-bottom:12px; display:flex; align-items:center; gap:15px;">
          <img src="${item.imageData}" style="width:80px; border-radius:8px;">
          <div style="flex:1;">
            <small>${item.date}</small><br>
            <strong style="font-size:0.95rem;">${item.text.substring(0, 60)}${item.text.length > 60 ? '...' : ''}</strong>
          </div>
        </div>
      `).join('');
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
      });
    }

    // Funciones de herramientas (mantengo las mismas)
    async function generateQR() {
      const text = document.getElementById('qr-input').value.trim();
      if (!text) return alert("Ingresa texto o enlace");

      const res = await fetch('/api/qr', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text})
      });
      const data = await res.json();

      document.getElementById('qr-result').innerHTML = `
        <img src="${data.image}" style="max-width:240px; border-radius:12px; margin:10px 0;">
        <button class="copy-btn" onclick="copyToClipboard('${text}')">📋 Copiar Enlace</button>
      `;

      saveToHistory(text, data.image);
    }

    // ... (las otras funciones se mantienen igual)
    async function generatePassword() { /* mismo código anterior */ }
    async function base64Action(action) { /* mismo código anterior */ }

    // Cargar historial al iniciar
    window.onload = loadHistory;
  </script>
</body>
</html>
