<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolify - Herramientas Online Gratis</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e2e8f0;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .navbar {
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    }

    .logo { 
      color: #6366f1; 
      font-size: 1.8rem; 
      font-weight: 700; 
    }

    .hero {
      text-align: center;
      padding: 100px 20px 60px;
    }

    .hero h1 {
      font-size: 3.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #6366f1, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 25px;
      padding: 40px 5%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tool-card {
      background: #1e2937;
      border-radius: 20px;
      padding: 30px;
      transition: all 0.4s ease;
      border: 1px solid rgba(99, 102, 241, 0.15);
    }

    .tool-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .input-field {
      width: 100%;
      padding: 14px;
      background: #334155;
      border: none;
      border-radius: 12px;
      color: white;
      margin: 12px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .copy-btn {
      background: #475569;
      margin-top: 8px;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #0f172a;
      border-radius: 12px;
      min-height: 70px;
    }

    footer {
      background: #0f172a;
      padding: 40px 5% 20px;
      margin-top: 80px;
      text-align: center;
      border-top: 1px solid rgba(99, 102, 241, 0.2);
    }

    .footer-links {
      margin: 20px 0;
    }

    .footer-links a {
      color: #94a3b8;
      margin: 0 15px;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #6366f1;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: white;
      padding: 14px 28px;
      border-radius: 9999px;
      box-shadow: 0 10px 15px rgba(0,0,0,0.4);
      display: none;
      z-index: 2000;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Toolify</div>
  </nav>

  <div class="hero">
    <h1>Herramientas Online</h1>
    <p style="font-size:1.25rem; color:#94a3b8;">Profesionales • Rápidas • Gratuitas</p>
  </div>

  <div class="tools-grid">
    <!-- Tus herramientas aquí (QR, Password, Contador, etc.) -->
    <!-- ... (mantén el mismo código de herramientas que tenías) ... -->
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-links">
      <a href="/privacy">Política de Privacidad</a>
      <a href="/terms">Términos y Condiciones</a>
      <a href="/about">Sobre Nosotros</a>
    </div>
    <p style="color: #64748b; font-size: 0.9rem;">
      © 2026 Toolify. Todas las herramientas son gratuitas.
    </p>
  </footer>

  <div class="toast" id="toast">✅ Copiado al portapapeles</div>

  <script>
    // Tus funciones de herramientas aquí (generateQR, generatePassword, etc.)
    // ... (mantén todo el script anterior)
  </script>
</body>
</html>
